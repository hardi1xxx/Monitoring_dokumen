<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Monitoring Dokumen - Telkom Akses</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <button id="showSidebarBtn" class="show-sidebar-btn" style="display:none;">☰</button>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="bars">📶</span>
        <div>
          <div class="brand-title">TELKOM AKSES</div>
          <div class="brand-sub">Monitoring Dokumen</div>
        </div>
      </div>
      <button id="toggleSidebar" class="toggle-sidebar" title="Hide/Show Menu">☰</button>
      <nav id="sidebarMenu" class="sidebar-menu">
        <button class="menu-item active" data-menu="__all__">
          <span class="menu-icon">🏠</span> Dashboard
        </button>
        <!-- dynamic menu items injected here -->
      </nav>
      <div class="sidebar-footer">
        <button id="refreshBtn">🔄 Refresh Data</button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <h1 id="pageTitle">Dashboard Monitoring Dokumen</h1>
          <span id="pageSubtitle" class="muted">Semua Project &middot; Update terakhir: <span id="updatedAt">-</span></span>
        </div>
        <div class="topbar-stats">
          <div class="stat-pill">
            <span class="stat-icon stat-icon--blue">💰</span>
            <div>
              <div class="stat-label">TOTAL POTENSI</div>
              <div class="stat-value" id="statPotensi">-</div>
              <div class="stat-sub" id="statPotensiSub">- LOP</div>
            </div>
          </div>
          <div class="stat-pill">
            <span class="stat-icon stat-icon--navy">📋</span>
            <div>
              <div class="stat-label">TOTAL STATUS</div>
              <div class="stat-value" id="statStatus">-</div>
              <div class="stat-sub">Status Smile</div>
            </div>
          </div>
          <div class="stat-pill">
            <span class="stat-icon stat-icon--red">📍</span>
            <div>
              <div class="stat-label">TOTAL MENU</div>
              <div class="stat-value" id="statBranch">-</div>
              <div class="stat-sub">Project</div>
            </div>
          </div>
        </div>
      </header>

      <div id="loadingState" class="loading">Memuat data dari Google Sheets...</div>
      <div id="errorState" class="error-box" style="display:none;"></div>

      <section id="dashboardContent" class="content-grid" style="display:none;">
        <div class="left-col">
          <div class="panel">
            <div class="panel-header">PROGRESS KESELURUHAN</div>
            <div class="panel-body" id="progressOverview"></div>
          </div>
          <div class="panel">
            <div class="panel-header">STATUS SMILE</div>
            <div class="panel-body">
              <table class="status-table" id="statusTable">
                <thead>
                  <tr><th>Status</th><th>LOP</th><th></th></tr>
                </thead>
                <tbody id="statusTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div class="panel-header standalone">RINGKASAN STATUS SMILE</div>
          <div id="statusCards" class="status-cards"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
